<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .status {
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .status.logged-in {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .status.logged-out {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .info {
            margin: 15px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        .info strong {
            color: #495057;
        }
        .info span {
            color: #6c757d;
            word-break: break-all;
        }
        .links {
            text-align: center;
            margin-top: 30px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin: 10px 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #5568d3;
        }
        .btn-danger {
            background: #dc3545;
        }
        .btn-danger:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Authentication Status</h1>
        <div id="status" class="status logged-out">
            Checking...
        </div>
        <div id="info"></div>
        <div class="links">
            <a href="/login.html" id="login-link">Login</a>
            <a href="/register.html" id="register-link">Register</a>
            <a href="/" id="home-link">Home</a>
            <a href="/chat.html" id="chat-link">Chat</a>
            <a href="/convo.html" id="conversations-link">Conversations</a>
            <a href="/a/" id="avatar-link">Agatha the Amazing Avatar</a>
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <button id="logout-btn" class="btn btn-danger" style="display: none;">Logout</button>
        </div>
    </div>

    <script>
        async function checkStatus() {
            try {
                const response = await fetch('/auth/status');
                const data = await response.json();
                
                const statusEl = document.getElementById('status');
                const infoEl = document.getElementById('info');
                const loginLink = document.getElementById('login-link');
                const registerLink = document.getElementById('register-link');
                const logoutBtn = document.getElementById('logout-btn');
                
                if (data.logged_in) {
                    statusEl.className = 'status logged-in';
                    statusEl.textContent = 'Logged In';
                    
                    infoEl.innerHTML = `
                        <div class="info"><strong>Email:</strong> <span>${data.email || 'N/A'}</span></div>
                        <div class="info"><strong>User ID:</strong> <span>${data.user_id || 'N/A'}</span></div>
                        <div class="info"><strong>Conversation ID:</strong> <span>${data.conversation_id || 'N/A (no conversations yet)'}</span></div>
                        <div class="info"><strong>Device ID:</strong> <span>${data.device_id || 'N/A'}</span></div>
                    `;
                    
                    loginLink.style.display = 'none';
                    registerLink.style.display = 'none';
                    logoutBtn.style.display = 'inline-block';
                } else {
                    statusEl.className = 'status logged-out';
                    statusEl.textContent = 'Logged Out';
                    
                    infoEl.innerHTML = '';
                    
                    loginLink.style.display = 'inline';
                    registerLink.style.display = 'inline';
                    logoutBtn.style.display = 'none';
                }
            } catch (error) {
                console.error('Error checking status:', error);
                document.getElementById('status').className = 'status logged-out';
                document.getElementById('status').textContent = 'Error checking status';
            }
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                const response = await fetch('/auth/logout', { method: 'POST' });
                if (response.ok) {
                    window.location.href = '/status.html';
                }
            } catch (error) {
                alert('Logout failed: ' + error.message);
            }
        });

        checkStatus();
    </script>
</body>
</html>
